name: E2E (regtest)

# End-to-end run against a private regtest chain with an in-node Chronik. Coins
# are generated on demand, so there is no faucet and no secret to manage. It runs
# on pull requests and pushes to main (so a regression blocks the merge) and on
# manual dispatch. The downloaded node and bun cache are cached to keep it fast.
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  ABC_VERSION: "0.33.3"
  RPC_ARGS: "-regtest -rpcuser=bj -rpcpassword=bj -rpcport=18443"
  BJ_NETWORK: regtest
  BJ_CHRONIK_URL: http://127.0.0.1:8331
  # A throwaway BIP-39 phrase. Regtest coins are generated locally and worthless,
  # so this is not a secret.
  BJ_MNEMONIC: "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"

jobs:
  e2e:
    name: Regtest e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Bitcoin ABC
        id: cache-abc
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/bitcoin-abc-${{ env.ABC_VERSION }}
          key: bitcoin-abc-${{ runner.os }}-${{ env.ABC_VERSION }}

      - name: Download Bitcoin ABC
        if: steps.cache-abc.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o abc.tar.gz \
            "https://download.bitcoinabc.org/${ABC_VERSION}/linux/bitcoin-abc-${ABC_VERSION}-x86_64-linux-gnu.tar.gz"
          tar xf abc.tar.gz

      - name: Add Bitcoin ABC to PATH
        run: echo "${{ github.workspace }}/bitcoin-abc-${ABC_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Start regtest node with Chronik
        run: |
          DATADIR="$PWD/.regtest"
          mkdir -p "$DATADIR"
          echo "DATADIR=$DATADIR" >> "$GITHUB_ENV"
          bitcoind $RPC_ARGS -datadir="$DATADIR" -daemon \
            -chronik -chronikbind=127.0.0.1:8331
          for _ in $(seq 1 60); do
            if bitcoin-cli $RPC_ARGS -datadir="$DATADIR" getblockchaininfo >/dev/null 2>&1; then
              echo "node is up"
              exit 0
            fi
            sleep 1
          done
          echo "node did not come up in time" >&2
          exit 1

      - name: Fund the agent and consensus addresses
        run: |
          CLI="bitcoin-cli $RPC_ARGS -datadir=$DATADIR"
          AGENT="$(bun test/e2e/print-address.ts agent)"
          CONSENSUS="$(bun test/e2e/print-address.ts consensus)"
          PAD="$(bun test/e2e/print-address.ts human)"
          echo "agent: $AGENT"
          echo "consensus: $CONSENSUS"
          # The Minter spends every funding coin of an address at once, and
          # coinbase outputs mature after 100 blocks. So generate the agent's and
          # the 2-of-2 consensus address's coins directly (signed by our own keys,
          # not the node wallet), then mine 100 more blocks to a different address
          # so every funding coin is mature and spendable.
          $CLI generatetoaddress 2 "$AGENT" >/dev/null
          $CLI generatetoaddress 2 "$CONSENSUS" >/dev/null
          $CLI generatetoaddress 100 "$PAD" >/dev/null
          echo "tip height: $($CLI getblockcount)"

      - name: Run e2e
        run: bun test test/e2e

      - name: Node log tail (on failure)
        if: failure()
        run: tail -n 100 "$DATADIR/regtest/debug.log" || true
