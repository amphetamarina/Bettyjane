name: E2E (regtest)

# End-to-end run against a private regtest chain with an in-node Chronik. Coins
# are generated on demand, so there is no faucet and no secret to manage. Kept
# separate from the hermetic main CI because it downloads and runs a full node;
# it runs on pushes to main and on manual dispatch.
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  ABC_VERSION: "0.32.8"
  RPC_ARGS: "-regtest -rpcuser=bj -rpcpassword=bj -rpcport=18443"
  BJ_NETWORK: regtest
  BJ_CHRONIK_URL: http://127.0.0.1:8331
  # A throwaway BIP-39 phrase. Regtest coins are generated locally and worthless,
  # so this is not a secret.
  BJ_MNEMONIC: "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"

jobs:
  e2e:
    name: Regtest e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Bitcoin ABC
        run: |
          curl -sSL -o abc.tar.gz \
            "https://download.bitcoinabc.org/${ABC_VERSION}/linux/bitcoin-abc-${ABC_VERSION}-x86_64-linux-gnu.tar.gz"
          tar xf abc.tar.gz
          echo "$PWD/bitcoin-abc-${ABC_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Start regtest node with Chronik
        run: |
          DATADIR="$PWD/.regtest"
          mkdir -p "$DATADIR"
          echo "DATADIR=$DATADIR" >> "$GITHUB_ENV"
          bitcoind $RPC_ARGS -datadir="$DATADIR" -daemon \
            -chronik -chronikbind=127.0.0.1:8331 -fallbackfee=20
          for _ in $(seq 1 60); do
            if bitcoin-cli $RPC_ARGS -datadir="$DATADIR" getblockchaininfo >/dev/null 2>&1; then
              echo "node is up"
              exit 0
            fi
            sleep 1
          done
          echo "node did not come up in time" >&2
          exit 1

      - name: Fund the agent address
        run: |
          CLI="bitcoin-cli $RPC_ARGS -datadir=$DATADIR"
          # The Minter spends all funding coins at once, and coinbase outputs need
          # 100 confirmations, so the agent cannot be funded with coinbases
          # directly (mint would try to spend an immature one). Mine to a node
          # wallet to mature the coinbases, then send a normal output to the agent.
          $CLI createwallet miner >/dev/null
          MINER="$($CLI -rpcwallet=miner getnewaddress)"
          $CLI generatetoaddress 200 "$MINER" >/dev/null
          ADDR="$(bun test/e2e/print-address.ts)"
          echo "agent address: $ADDR"
          $CLI -rpcwallet=miner -named sendtoaddress address="$ADDR" amount=1000 >/dev/null
          $CLI generatetoaddress 1 "$MINER" >/dev/null
          echo "tip height: $($CLI getblockcount)"

      - name: Run e2e
        run: bun test test/e2e

      - name: Node log tail (on failure)
        if: failure()
        run: tail -n 100 "$DATADIR/regtest/debug.log" || true
